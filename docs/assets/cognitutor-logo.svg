<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Cognition-Adaptive AI Tutor logo</title>
  <desc id="desc">A polished banner showing a brain, book, adaptive path nodes, and AI tutor signal lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
