      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#06131f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="34" fill="url(#bg)"/>

