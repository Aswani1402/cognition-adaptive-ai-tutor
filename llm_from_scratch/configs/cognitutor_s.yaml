model:
  model_name: CogniTutorLM-S
  vocab_size: 8000
  context_length: 256
  n_layers: 4
  n_heads: 4
  n_embd: 256
  dropout: 0.1

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0003
  epochs: 1
  weight_decay: 0.01
  grad_clip: 1.0
  device: auto

data:
  dataset_path: data/processed/tutor_instruction_dataset.jsonl
  tokenizer_dir: data/tokenizer
  train_split: data/splits/train.jsonl
  val_split: data/splits/val.jsonl
  test_split: data/splits/test.jsonl

outputs:
  checkpoint_dir: outputs/checkpoints
  sample_dir: outputs/samples
  metrics_dir: outputs/metrics
  plot_dir: outputs/plots